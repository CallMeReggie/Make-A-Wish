<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Make a Wish</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            position: relative;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite var(--delay);
        }

        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.08;
                transform: scale(1);
            }
            30% {
                opacity: 0.9;
                transform: scale(1.8);
            }
            60% {
                opacity: 0.15;
                transform: scale(0.8);
            }
        }

        .app {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            width: 100%;
            max-width: 440px;
        }

        .clock {
            font-family: 'Cinzel', serif;
            font-size: clamp(42px, 10vw, 64px);
            font-weight: 400;
            color: #fff;
            letter-spacing: 0.08em;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.35), 0 0 60px rgba(255, 255, 255, 0.15);
            margin-bottom: 2px;
            line-height: 1;
            animation: fadeIn 1.5s ease forwards;
        }

        .date-line {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(12px, 3vw, 15px);
            font-weight: 300;
            color: rgba(255, 255, 255, 0.45);
            letter-spacing: 0.22em;
            text-transform: uppercase;
            margin-bottom: 34px;
            animation: fadeIn 2s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .hands-wrap {
            position: relative;
            width: 280px;
            height: 310px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 28px;
            animation: floatHands 5.5s ease-in-out infinite;
        }

        @keyframes floatHands {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-12px);
            }
        }

        .sparkle {
            position: absolute;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            animation: sparkleAnim var(--dur2) ease-in-out infinite var(--delay2);
            pointer-events: none;
        }

        @keyframes sparkleAnim {
            0% {
                opacity: 0;
                transform: scale(0) translate(0, 0);
            }
            40% {
                opacity: 1;
                transform: scale(1.3) translate(var(--tx), var(--ty));
            }
            100% {
                opacity: 0;
                transform: scale(0) translate(calc(var(--tx) * 1.8), calc(var(--ty) * 1.8));
            }
        }

        .logo-graphic {
            filter: drop-shadow(0 0 18px rgba(255, 255, 255, 0.35))
                drop-shadow(0 0 45px rgba(255, 255, 255, 0.12))
                drop-shadow(0 0 80px rgba(255, 220, 180, 0.08));
            transition: filter 0.6s ease;
            width: 100%;
            height: auto;
            max-width: 260px;
        }

        .hands-wrap:hover .logo-graphic {
            filter: drop-shadow(0 0 26px rgba(255, 255, 255, 0.55))
                drop-shadow(0 0 60px rgba(255, 255, 255, 0.22))
                drop-shadow(0 0 100px rgba(255, 220, 180, 0.15));
        }

        .wish-btn {
            position: relative;
            background: transparent;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            padding: 0;
            outline: none;
            animation: fadeInUp 2.5s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .wish-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(28px, 7vw, 40px);
            font-weight: 300;
            font-style: italic;
            color: #fff;
            letter-spacing: 0.04em;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
            line-height: 1;
        }

        .wish-btn:hover .wish-text,
        .wish-btn:active .wish-text {
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.9), 0 0 60px rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }
        .wish-btn:active .wish-text {
            transform: scale(0.97);
        }

        .pulse-ring {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.75);
            box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.5);
            animation: pulse 2.5s ease-out infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.6);
            }
            70% {
                box-shadow: 0 0 0 24px rgba(255, 255, 255, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            }
        }

        .camera-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }
        .camera-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        video {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .cam-ui {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100%;
            width: 100%;
            padding: 60px 30px 50px;
        }

        .cam-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .cam-close {
            background: rgba(0, 0, 0, 0.45);
            border: 1.5px solid rgba(255, 255, 255, 0.3);
            color: #fff;
            font-size: 13px;
            letter-spacing: 0.15em;
            font-family: 'Cinzel', serif;
            padding: 8px 18px;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            transition: all 0.2s;
        }
        .cam-close:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .rec-badge {
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(0, 0, 0, 0.45);
            border: 1.5px solid rgba(255, 80, 80, 0.6);
            border-radius: 20px;
            padding: 7px 14px;
            backdrop-filter: blur(8px);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .rec-badge.visible {
            opacity: 1;
        }
        .rec-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ff4444;
            animation: blink 1s ease-in-out infinite;
        }
        @keyframes blink {
            0%,
            100% {
                opacity: 1
            }
            50% {
                opacity: 0.2
            }
        }
        .rec-time {
            font-family: 'Cinzel', serif;
            font-size: 12px;
            color: #fff;
            letter-spacing: 0.12em;
        }

        .cam-bottom {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }
        .wish-label {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 20px;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 0.06em;
        }
        .record-btn {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: 3.5px solid rgba(255, 255, 255, 0.85);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }
        .record-btn-inner {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #fff;
            transition: all 0.3s ease;
        }
        .record-btn.recording .record-btn-inner {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: #ff3b30;
        }
        .record-btn:active {
            transform: scale(0.95);
        }

        .cam-error {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 40px;
            text-align: center;
            z-index: 20;
            background: #000;
        }
        .cam-error-icon {
            font-size: 48px;
            opacity: 0.7;
        }
        .cam-error-title {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            color: #fff;
            letter-spacing: 0.1em;
            margin-bottom: 4px;
        }
        .cam-error-msg {
            font-family: 'Cormorant Garamond', serif;
            font-size: 16px;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.6;
            font-style: italic;
            max-width: 280px;
        }
        .cam-back {
            margin-top: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.25);
            color: #fff;
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 0.2em;
            padding: 10px 24px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .cam-back:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .download-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.95);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            z-index: 200;
            transform: translateY(100%);
            transition: transform 0.4s ease;
            backdrop-filter: blur(16px);
        }
        .download-bar.visible {
            transform: translateY(0);
        }
        .dl-text {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            color: rgba(255, 255, 255, 0.8);
            font-size: 16px;
        }
        .dl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            font-family: 'Cinzel', serif;
            font-size: 11px;
            letter-spacing: 0.18em;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .dl-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>

    <div class="app">
        <div class="clock" id="clock">00:00:00</div>
        <div class="date-line" id="dateLine">Monday, January 1</div>

        <div class="hands-wrap" id="handsWrap">
            <div class="sparkle" style="width:5px;height:5px;--dur2:2.8s;--delay2:0s;--tx:-38px;--ty:-40px;top:22%;left:10%;"></div>
            <div class="sparkle" style="width:4px;height:4px;--dur2:3.2s;--delay2:0.6s;--tx:40px;--ty:-44px;top:14%;right:8%;"></div>
            <div class="sparkle" style="width:3px;height:3px;--dur2:2.5s;--delay2:1.1s;--tx:-26px;--ty:34px;bottom:20%;left:6%;"></div>
            <div class="sparkle" style="width:4px;height:4px;--dur2:3.5s;--delay2:0.3s;--tx:32px;--ty:28px;bottom:24%;right:6%;"></div>
            <div class="sparkle" style="width:3px;height:3px;--dur2:2.2s;--delay2:1.8s;--tx:-20px;--ty:-50px;top:4%;left:34%;"></div>
            <div class="sparkle" style="width:5px;height:5px;--dur2:3.8s;--delay2:0.9s;--tx:22px;--ty:-36px;top:8%;right:28%;"></div>
            <div class="sparkle" style="width:3px;height:3px;--dur2:3s;--delay2:2.1s;--tx:-42px;--ty:14px;top:48%;left:0%;"></div>
            <div class="sparkle" style="width:4px;height:4px;--dur2:2.6s;--delay2:1.4s;--tx:40px;--ty:12px;top:42%;right:0%;"></div>

<img class="logo-graphic" src="your-transparent-praying-hands.png" alt="Praying Hands" style="width:100%; height:auto; max-width:260px; object-fit:contain;">
</div>

        <button class="wish-btn" id="wishBtn" onclick="openCamera()">
            <div class="wish-text">Make a Wish</div>
            <div class="pulse-ring"></div>
        </button>
    </div>

    <!-- For Camera  -->
    <div class="camera-overlay" id="camOverlay">
        <video id="videoEl" autoplay playsinline muted></video>
        <div class="cam-ui">
            <div class="cam-top">
                <button class="cam-close" onclick="closeCamera()">✕ Close</button>
                <div class="rec-badge" id="recBadge">
                    <div class="rec-dot"></div>
                    <span class="rec-time" id="recTime">00:00</span>
                </div>
                <div style="width:80px"></div>
            </div>
            <div class="cam-bottom">
                <div class="wish-label">Recording your wish...</div>
                <button class="record-btn" id="recordBtn" onclick="toggleRecord()">
                    <div class="record-btn-inner" id="recordInner"></div>
                </button>
            </div>
        </div>
        <div class="cam-error" id="camError" style="display:none">
            <div class="cam-error-icon">📷</div>
            <div class="cam-error-title">Camera not available</div>
            <div class="cam-error-msg">
                To record your wish, open this page in a secure browser (HTTPS) or from a local server.
            </div>
            <button class="cam-back" onclick="closeCamera()">← Go back</button>
        </div>
    </div>

    <div class="download-bar" id="downloadBar">
        <div class="dl-text">Your wish is saved ✨</div>
        <button class="dl-btn" id="dlBtn">Download</button>
    </div>

    <script>
        // Floating Dots daw
        const starsEl = document.getElementById('stars');
        for (let i = 0; i < 90; i++) {
            const s = document.createElement('div');
            s.className = 'star';
            const size = Math.random() * 2.8 + 0.5;
            s.style.cssText =
                `width:${size}px;height:${size}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--dur:${2+Math.random()*5}s;--delay:${Math.random()*5}s`;
            starsEl.appendChild(s);
        }

        // Orasan
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent =
                `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October',
                'November', 'December'
            ];
            document.getElementById('dateLine').textContent =
                `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // Camera & recording
        let stream = null;
        let mediaRecorder = null;
        let recordedChunks = [];
        let recInterval = null;
        let recSeconds = 0;
        let isRecording = false;
        let blobURL = null;

        async function openCamera() {
            const overlay = document.getElementById('camOverlay');
            const errorPanel = document.getElementById('camError');
            overlay.classList.add('active');
            errorPanel.style.display = 'none';

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user' },
                    audio: true
                });
                document.getElementById('videoEl').srcObject = stream;
            } catch (err) {
                console.warn('Camera access failed:', err);
                errorPanel.style.display = 'flex';
            }
        }

        function closeCamera() {
            stopRecording();
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            document.getElementById('videoEl').srcObject = null;
            document.getElementById('camOverlay').classList.remove('active');
        }

        function toggleRecord() {
            if (isRecording) {
                stopRecording();
            } else {
                startRecording();
            }
        }

        function startRecording() {
            if (!stream) return;
            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/webm' });
                blobURL = URL.createObjectURL(blob);
                document.getElementById('dlBtn').onclick = () => {
                    const a = document.createElement('a');
                    a.href = blobURL;
                    a.download = 'my-wish.webm';
                    a.click();
                };
                document.getElementById('downloadBar').classList.add('visible');
                setTimeout(() => document.getElementById('downloadBar').classList.remove('visible'), 7000);
            };
            mediaRecorder.start();
            isRecording = true;
            recSeconds = 0;
            document.getElementById('recBadge').classList.add('visible');
            document.getElementById('recordBtn').classList.add('recording');
            recInterval = setInterval(() => {
                recSeconds++;
                const mm = String(Math.floor(recSeconds / 60)).padStart(2, '0');
                const ss = String(recSeconds % 60).padStart(2, '0');
                document.getElementById('recTime').textContent = `${mm}:${ss}`;
            }, 1000);
        }

        function stopRecording() {
            if (!isRecording) return;
            isRecording = false;
            clearInterval(recInterval);
            document.getElementById('recBadge').classList.remove('visible');
            document.getElementById('recordBtn').classList.remove('recording');
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
        }
    </script>
</body>
</html>
